<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Workout"/>
<title>My PPL Workout Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#f0f0f0;font-family:Georgia,serif;min-height:100vh;padding-bottom:80px;}
button{cursor:pointer;font-family:Georgia,serif;}
textarea,input{font-family:Georgia,serif;}
::-webkit-scrollbar{display:none;}
.top-nav{display:flex;background:#0d0d0d;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:100;}
.nav-btn{flex:1;padding:14px 0;background:none;border:none;border-bottom:2px solid transparent;color:#555;font-size:13px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;}
.day-scroll{display:flex;overflow-x:auto;padding:10px 14px;gap:6px;}
.day-btn{flex-shrink:0;padding:7px 12px;border-radius:20px;border:2px solid #1e1e1e;background:#111;color:#555;font-size:11px;font-weight:bold;letter-spacing:1px;line-height:1.6;}
.ex-card{background:#111;border-radius:14px;border:1px solid #1c1c1c;overflow:hidden;margin-bottom:10px;}
.set-row{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:9px;background:#181818;border:1px solid #242424;transition:all 0.15s;margin-bottom:5px;}
.set-row.done{background:rgba(255,77,0,0.08);}
.set-input{padding:4px 6px;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;outline:none;}
.star-btn{background:none;border:none;font-size:15px;padding:0 1px;color:#333;transition:color 0.1s;}
.star-btn.lit{color:#FFD600;}
.tick-btn{width:34px;height:34px;border-radius:8px;border:2px solid #333;background:#111;color:#444;font-size:13px;font-weight:bold;flex-shrink:0;}
.tick-btn.done{color:#fff;}
.save-btn{width:100%;padding:15px;border-radius:14px;border:none;color:#fff;font-size:15px;font-weight:bold;letter-spacing:1px;}
.card{background:#111;border-radius:14px;border:1px solid #1c1c1c;padding:14px;}
.section{padding:6px 14px;}
.filter-btn{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid #1e1e1e;background:#111;color:#444;font-size:11px;font-weight:bold;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PLAN={
  Monday:{name:"PUSH 1",color:"#FF4D00",exercises:[
    {name:"Barbell Bench Press",sets:4,reps:"8-12",load:"HEAVY",loadNote:"Progressive overload — increase weight weekly",tfcc:false},
    {name:"Dumbbell Shoulder Press",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Pyramid up each set",tfcc:false},
    {name:"Cable Fly Low to High",sets:3,reps:"12",load:"MODERATE",loadNote:"Feel the stretch & squeeze, not heavy",tfcc:false},
    {name:"Rope Pushdown",sets:3,reps:"12",load:"MODERATE",loadNote:"Mind-muscle connection, feel the tricep",tfcc:false},
    {name:"Lateral Raises",sets:3,reps:"12-15",load:"LIGHT",loadNote:"5-8kg is enough, burn is the goal",tfcc:false},
    {name:"Plank",sets:3,reps:"40 sec",load:"BODYWEIGHT",loadNote:"ABS — squeeze core throughout",tfcc:false},
    {name:"Leg Raises",sets:3,reps:"12",load:"BODYWEIGHT",loadNote:"ABS — slow and controlled",tfcc:false},
  ]},
  Tuesday:{name:"PULL 1",color:"#00B4D8",exercises:[
    {name:"Deadlift",sets:4,reps:"6-8",load:"HEAVY",loadNote:"Use hooks — primary mass builder",tfcc:true},
    {name:"Lat Pulldown (Neutral Grip)",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — neutral grip only for TFCC",tfcc:true},
    {name:"Seated Cable Row",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — squeeze at end of each rep",tfcc:true},
    {name:"Face Pulls",sets:3,reps:"15",load:"LIGHT",loadNote:"Light weight, focus on rear delt squeeze",tfcc:false},
    {name:"Dumbbell Shrugs",sets:3,reps:"12-15",load:"MODERATE",loadNote:"Hold 1-2 sec at top for traps",tfcc:false},
    {name:"Dumbbell Bicep Curl",sets:3,reps:"10-12",load:"MODERATE",loadNote:"8-10kg, full range of motion",tfcc:false},
    {name:"Cable Crunches",sets:3,reps:"15",load:"MODERATE",loadNote:"ABS — controlled descent",tfcc:false},
    {name:"Russian Twists",sets:3,reps:"20",load:"BODYWEIGHT",loadNote:"ABS — slow rotation",tfcc:false},
  ]},
  Wednesday:{name:"LEGS 1",color:"#7B2FBE",exercises:[
    {name:"Barbell Squat",sets:4,reps:"8-10",load:"HEAVY",loadNote:"Primary leg mass builder — go heavy",tfcc:false},
    {name:"Romanian Deadlift",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — feel hamstring stretch",tfcc:true},
    {name:"Leg Press",sets:3,reps:"10-12",load:"HEAVY",loadNote:"Go heavy here, safe on wrists",tfcc:false},
    {name:"Leg Curl",sets:3,reps:"12",load:"MODERATE",loadNote:"Slow and controlled, feel the hamstring",tfcc:false},
    {name:"Calf Raises",sets:4,reps:"15-20",load:"MODERATE",loadNote:"Pause at top and bottom each rep",tfcc:false},
    {name:"Plank",sets:3,reps:"45 sec",load:"BODYWEIGHT",loadNote:"ABS — longer hold than Monday",tfcc:false},
    {name:"Leg Raises",sets:3,reps:"12",load:"BODYWEIGHT",loadNote:"ABS — slow and controlled",tfcc:false},
  ]},
  Thursday:{name:"REST",color:"#2D6A4F",exercises:[
    {name:"Light Walking",sets:1,reps:"20-30 min",load:"NONE",loadNote:"Active recovery — easy pace only",tfcc:false},
    {name:"Dead Hangs",sets:3,reps:"20-30 sec",load:"BODYWEIGHT",loadNote:"Grip + wrist decompression — if pain-free",tfcc:false},
    {name:"Gentle Wrist Stretches",sets:3,reps:"30 sec",load:"NONE",loadNote:"TFCC care — very gentle, no force",tfcc:true},
  ]},
  Friday:{name:"PUSH 2",color:"#FF4D00",exercises:[
    {name:"Incline Dumbbell Press",sets:4,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Pyramid up — upper chest focus",tfcc:false},
    {name:"Arnold Press",sets:3,reps:"10-12",load:"MODERATE",loadNote:"Full rotation, feel all heads of shoulder",tfcc:false},
    {name:"Cable Fly High to Low",sets:3,reps:"12",load:"MODERATE",loadNote:"Lower chest focus — squeeze at bottom",tfcc:false},
    {name:"Overhead Tricep Extension",sets:3,reps:"12",load:"MODERATE",loadNote:"Full stretch at top, mind-muscle focus",tfcc:false},
    {name:"Lateral Raises",sets:3,reps:"12-15",load:"LIGHT",loadNote:"5-8kg only — shoulder burn is the goal",tfcc:false},
  ]},
  Saturday:{name:"PULL 2",color:"#00B4D8",exercises:[
    {name:"Lat Pulldown (Neutral Grip)",sets:4,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — slightly heavier than Tuesday",tfcc:true},
    {name:"Single Arm Dumbbell Row",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — brace on bench, full range",tfcc:true},
    {name:"Low Row",sets:3,reps:"10-12",load:"MODERATE",loadNote:"Squeeze shoulder blades at end",tfcc:false},
    {name:"Dumbbell Shrugs",sets:3,reps:"12-15",load:"MODERATE",loadNote:"Hold at top for traps activation",tfcc:false},
    {name:"Hammer Curls",sets:3,reps:"10-12",load:"MODERATE",loadNote:"Neutral grip — safer for TFCC",tfcc:true},
    {name:"Preacher Curl",sets:3,reps:"10-12",load:"MODERATE",loadNote:"Full stretch at bottom, slow negative",tfcc:false},
  ]},
  Sunday:{name:"LEGS 2",color:"#7B2FBE",exercises:[
    {name:"Hack Squat / Goblet Squat",sets:4,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Different angle from Wednesday squats",tfcc:false},
    {name:"Walking Lunges",sets:3,reps:"12 each leg",load:"MODERATE",loadNote:"Bodyweight or light dumbbells — balance focus",tfcc:false},
    {name:"Romanian Deadlift",sets:3,reps:"10-12",load:"MODERATE-HEAVY",loadNote:"Use hooks — hamstring stretch focus",tfcc:true},
    {name:"Leg Extension",sets:3,reps:"12",load:"MODERATE",loadNote:"Quad isolation — slow controlled reps",tfcc:false},
    {name:"Calf Raises",sets:4,reps:"15-20",load:"MODERATE",loadNote:"Pause at top and bottom",tfcc:false},
  ]},
};

const GRIP=[
  {name:"Dead Hangs",sets:3,reps:"30 sec",load:"BODYWEIGHT",loadNote:"Add to any 3 sessions per week"},
  {name:"Farmer's Carry",sets:3,reps:"40 sec",load:"20KG MAX",loadNote:"TFCC limit — do NOT exceed 20kg"},
];

const LOAD_STYLE={
  "HEAVY":{bg:"rgba(255,77,0,0.1)",border:"#FF4D00",text:"#FF4D00"},
  "MODERATE-HEAVY":{bg:"rgba(255,140,0,0.1)",border:"#FF8C00",text:"#FF8C00"},
  "MODERATE":{bg:"rgba(255,214,0,0.1)",border:"#FFD600",text:"#b8a000"},
  "LIGHT":{bg:"rgba(0,180,216,0.1)",border:"#00B4D8",text:"#00B4D8"},
  "BODYWEIGHT":{bg:"rgba(45,106,79,0.1)",border:"#2D6A4F",text:"#52b788"},
  "NONE":{bg:"rgba(85,85,85,0.1)",border:"#555",text:"#888"},
  "20KG MAX":{bg:"rgba(255,77,0,0.1)",border:"#FF4D00",text:"#FF4D00"},
};

const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// App state
let S={
  tab:"today",
  day:DAYS[new Date().getDay()===0?6:new Date().getDay()-1],
  showGrip:false,
  showLastSession:false,
  expandedNotes:{},
  histFilter:"All",
  saveMsg:"",
};

function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getSess(){return ls("wt_s3",{});}
function setSess(s){ss("wt_s3",s);}
function getHist(){return ls("wt_h3",[]);}
function setHist(h){ss("wt_h3",h);}

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}

function gv(day,field,ei,si){
  const k=si!==undefined?`${day}__${field}__${ei}__${si}`:`${day}__${field}__${ei}`;
  return getSess()[k]??(field==="set"?false:"");
}
function sv(day,field,ei,val,si){
  const s=getSess();
  const k=si!==undefined?`${day}__${field}__${ei}__${si}`:`${day}__${field}__${ei}`;
  s[k]=val; setSess(s);
}
function getSN(day){return getSess()[`${day}__sn`]||"";}
function setSN(day,v){const s=getSess();s[`${day}__sn`]=v;setSess(s);}

function saveSession(){
  const day=S.day; const plan=PLAN[day];
  const entry={
    id:Date.now(), date:todayStr(), day, dayName:plan.name,
    exercises:plan.exercises.map((ex,ei)=>({
      name:ex.name,
      sets:Array.from({length:ex.sets},(_,si)=>({
        weight:gv(day,"sw",ei,si)||"-",
        reps:gv(day,"sr",ei,si)||"-",
        rating:Number(gv(day,"srat",ei,si))||0,
        done:!!gv(day,"set",ei,si),
      })),
      setsCompleted:Array.from({length:ex.sets},(_,si)=>gv(day,"set",ei,si)?1:0).reduce((a,b)=>a+b,0),
      totalSets:ex.sets,
      note:gv(day,"note",ei),
    })),
    sessionNote:getSN(day),
  };
  let h=getHist().filter(x=>!(x.date===entry.date&&x.day===day));
  h=[entry,...h].slice(0,300); setHist(h);
  S.saveMsg="Session saved! ✓";
  setTimeout(()=>{S.saveMsg="";render();},2500);
  render();
}

function exportCSV(){
  const rows=[["Date","Day","Session","Exercise","S1 Weight","S1 Reps","S1 Rating","S2 Weight","S2 Reps","S2 Rating","S3 Weight","S3 Reps","S3 Rating","S4 Weight","S4 Reps","S4 Rating","Note","Session Note"]];
  getHist().forEach(h=>{
    h.exercises.forEach(ex=>{
      const row=[h.date,h.day,h.dayName,ex.name];
      for(let i=0;i<4;i++){
        const s=ex.sets&&ex.sets[i];
        row.push(s?s.weight:"",s?s.reps:"",s?s.rating:"");
      }
      row.push(ex.note||"",h.sessionNote||"");
      rows.push(row);
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`workout-${todayStr()}.csv`; a.click();
}

function stars(rating,ei,si,day){
  let h="";
  for(let i=1;i<=5;i++){
    const lit=i<=Number(rating);
    h+=`<button class="star-btn ${lit?"lit":""}" onclick="sv('${day}','srat',${ei},${i==Number(rating)?0:i},${si});render();">★</button>`;
  }
  return h;
}

function renderStarsStatic(rating){
  let h="";
  for(let i=1;i<=5;i++) h+=`<span style="color:${i<=rating?"#FFD600":"#2a2a2a"};font-size:11px;">★</span>`;
  return h;
}

function render(){
  const plan=PLAN[S.day];
  const dc=plan.color;
  let total=0,done=0;
  plan.exercises.forEach((ex,ei)=>{
    total+=ex.sets;
    for(let si=0;si<ex.sets;si++) if(gv(S.day,"set",ei,si)) done++;
  });
  const pct=total>0?Math.round((done/total)*100):0;
  const hist=getHist();
  const lastSess=hist.find(h=>h.day===S.day);
  const filtHist=S.histFilter==="All"?hist:hist.filter(h=>h.day===S.histFilter);

  let html=`
  <div class="top-nav">
    <button class="nav-btn" style="border-bottom-color:${S.tab==="today"?dc:"transparent"};color:${S.tab==="today"?dc:"#555"};" onclick="S.tab='today';render();">📋 Workout</button>
    <button class="nav-btn" style="border-bottom-color:${S.tab==="history"?dc:"transparent"};color:${S.tab==="history"?dc:"#555"};" onclick="S.tab='history';render();">📈 History</button>
  </div>`;

  if(S.tab==="today"){
    // Header
    html+=`
    <div style="background:linear-gradient(135deg,${dc}18,#0a0a0a);border-bottom:1px solid ${dc}22;padding:20px 16px 14px;">
      <div style="font-size:10px;letter-spacing:4px;color:#555;margin-bottom:4px;">YOUR PPL PLAN</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><span style="font-size:26px;font-weight:bold;color:${dc};">${S.day}</span><span style="font-size:14px;color:#666;margin-left:8px;">${plan.name}</span></div>
        <div style="text-align:right;"><div style="font-size:20px;font-weight:bold;color:${dc};">${pct}%</div><div style="font-size:11px;color:#555;">${done}/${total} sets</div></div>
      </div>
      <div style="margin-top:10px;height:3px;background:#1e1e1e;border-radius:2px;"><div style="height:100%;width:${pct}%;background:${dc};border-radius:2px;transition:width 0.3s;"></div></div>
      <div style="margin-top:8px;font-size:11px;color:#555;">📅 ${fmtDate(todayStr())}</div>
    </div>`;

    // Day selector
    html+=`<div class="day-scroll">`;
    DAYS.forEach(d=>{
      const a=d===S.day;
      html+=`<button class="day-btn" style="${a?`border-color:${PLAN[d].color};color:${PLAN[d].color};background:rgba(255,255,255,0.04);`:""}" onclick="S.day='${d}';S.showLastSession=false;render();">${d.slice(0,3).toUpperCase()}<br><span style="font-size:9px;">${PLAN[d].name}</span></button>`;
    });
    html+=`</div>`;

    // Last session comparison
    if(lastSess){
      html+=`<div class="section">
        <button style="width:100%;padding:11px 14px;background:#111;border:1px solid ${dc}33;border-radius:12px;color:${dc};font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="S.showLastSession=!S.showLastSession;render();">
          <span>📊 Last ${S.day} — ${fmtDate(lastSess.date)}</span><span>${S.showLastSession?"▲":"▼"}</span>
        </button>`;
      if(S.showLastSession){
        html+=`<div style="background:#0d0d0d;border:1px solid ${dc}22;border-top:none;border-radius:0 0 12px 12px;padding:10px 14px;">`;
        lastSess.exercises.forEach((ex,i)=>{
          html+=`<div style="padding-bottom:8px;margin-bottom:8px;border-bottom:${i<lastSess.exercises.length-1?"1px solid #1a1a1a":"none"};">
            <div style="font-size:12px;font-weight:bold;color:#ccc;margin-bottom:4px;">${ex.name}</div>`;
          if(ex.sets){
            ex.sets.forEach((s,si)=>{
              html+=`<div style="display:flex;gap:8px;font-size:11px;color:#666;margin-bottom:2px;align-items:center;">
                <span style="color:#555;width:20px;">S${si+1}</span>
                <span style="color:#999;">${s.weight!=="-"?s.weight+"kg":""}</span>
                <span>${s.reps!=="-"?s.reps+" reps":""}</span>
                <span>${renderStarsStatic(s.rating)}</span>
              </div>`;
            });
          }
          if(ex.note) html+=`<div style="font-size:10px;color:#555;font-style:italic;margin-top:3px;">📝 ${ex.note}</div>`;
          html+=`</div>`;
        });
        if(lastSess.sessionNote) html+=`<div style="font-size:11px;color:#666;font-style:italic;border-top:1px solid #1a1a1a;padding-top:8px;">💬 ${lastSess.sessionNote}</div>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }

    // Exercises
    html+=`<div style="padding:4px 14px;">`;
    plan.exercises.forEach((ex,ei)=>{
      const lc=LOAD_STYLE[ex.load]||LOAD_STYLE.MODERATE;
      const noteExp=S.expandedNotes[`${S.day}-${ei}`];
      const noteVal=gv(S.day,"note",ei);
      html+=`<div class="ex-card">
        <div style="padding:13px 14px 8px;">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start;">
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:bold;color:#eee;line-height:1.3;">${ex.name}${ex.tfcc?`<span style="margin-left:7px;font-size:9px;background:rgba(255,77,0,0.1);color:#FF4D00;padding:2px 5px;border-radius:4px;border:1px solid rgba(255,77,0,0.2);">🪝 HOOKS</span>`:""}</div>
              <div style="font-size:11px;color:#555;margin-top:2px;">${ex.sets} sets × ${ex.reps}</div>
            </div>
            <div style="padding:3px 9px;border-radius:7px;background:${lc.bg};border:1px solid ${lc.border};color:${lc.text};font-size:9px;font-weight:bold;letter-spacing:1px;flex-shrink:0;">${ex.load}</div>
          </div>
          <div style="margin-top:6px;font-size:11px;color:#666;font-style:italic;">${ex.loadNote}</div>
        </div>
        <div style="padding:0 14px 8px;">`;

      // Per-set rows
      for(let si=0;si<ex.sets;si++){
        const isDone=!!gv(S.day,"set",ei,si);
        const wv=gv(S.day,"sw",ei,si);
        const rv=gv(S.day,"sr",ei,si);
        const rat=Number(gv(S.day,"srat",ei,si))||0;
        const repPH=ex.reps.includes("-")?ex.reps.split("-")[1]:ex.reps;
        html+=`<div class="set-row ${isDone?"done":""}" style="${isDone?`background:${dc}12;border-color:${dc}44;`:""}">
          <span style="font-size:11px;font-weight:bold;color:${isDone?dc:"#555"};width:22px;flex-shrink:0;">S${si+1}</span>`;
        if(ex.load!=="BODYWEIGHT"&&ex.load!=="NONE"){
          html+=`<input class="set-input" type="number" placeholder="kg" value="${wv}" style="width:50px;border-color:${isDone?dc+"44":"#2a2a2a"};" oninput="sv('${S.day}','sw',${ei},this.value,${si});"/>
          <span style="font-size:10px;color:#444;flex-shrink:0;">kg</span>`;
        }
        html+=`<input class="set-input" type="number" placeholder="${repPH}" value="${rv}" style="width:38px;border-color:${isDone?dc+"44":"#2a2a2a"};" oninput="sv('${S.day}','sr',${ei},this.value,${si});"/>
          <span style="font-size:10px;color:#444;flex-shrink:0;">reps</span>
          <div style="flex:1;"></div>
          <div style="display:flex;gap:1px;flex-shrink:0;">${stars(rat,ei,si,S.day)}</div>
          <button class="tick-btn ${isDone?"done":""}" style="${isDone?`background:${dc};border-color:${dc};`:""}" onclick="sv('${S.day}','set',${ei},!${isDone},${si});render();">${isDone?"✓":"○"}</button>
        </div>`;
      }

      html+=`</div>
        <div style="padding:0 14px 12px;">
          <button style="background:none;border:none;font-size:11px;padding:0;color:${noteVal?dc:"#333"};display:flex;align-items:center;gap:4px;cursor:pointer;" onclick="S.expandedNotes['${S.day}-${ei}']=!S.expandedNotes['${S.day}-${ei}'];render();">
            <span>${noteExp?"▲":"▼"}</span><span>${noteVal?"📝 Note for next session":"Add note for next session"}</span>
          </button>
          ${noteExp?`<textarea style="margin-top:7px;width:100%;padding:7px 9px;background:#161616;border:1px solid ${dc}33;border-radius:7px;color:#bbb;font-size:11px;outline:none;resize:none;line-height:1.5;" rows="2" placeholder="e.g. Try 17.5kg next time..." oninput="sv('${S.day}','note',${ei},this.value);">${noteVal}</textarea>`:""}
        </div>
      </div>`;
    });
    html+=`</div>`;

    // Grip
    html+=`<div class="section">
      <button style="width:100%;padding:13px 14px;background:#111;border:1px solid #1e1e1e;border-radius:14px;color:#666;font-size:13px;text-align:left;display:flex;justify-content:space-between;" onclick="S.showGrip=!S.showGrip;render();">
        <span>💪 Grip Work (add to any 3 sessions)</span><span>${S.showGrip?"▲":"▼"}</span>
      </button>`;
    if(S.showGrip){
      html+=`<div style="margin-top:7px;">`;
      GRIP.forEach(ex=>{
        const lc=LOAD_STYLE[ex.load]||LOAD_STYLE.MODERATE;
        html+=`<div style="background:#111;border-radius:12px;border:1px solid #1c1c1c;padding:11px 14px;margin-bottom:7px;">
          <div style="font-size:13px;font-weight:bold;color:#eee;">${ex.name}</div>
          <div style="font-size:11px;color:#555;margin-top:2px;">${ex.sets} sets × ${ex.reps}</div>
          <div style="margin-top:5px;display:inline-block;padding:2px 8px;border-radius:5px;background:${lc.bg};border:1px solid ${lc.border};color:${lc.text};font-size:9px;font-weight:bold;">${ex.load}</div>
          <div style="font-size:11px;color:#666;font-style:italic;margin-top:5px;">${ex.loadNote}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;

    // Session note
    html+=`<div class="section"><div class="card" style="border-color:${dc}22;">
      <div style="font-size:10px;letter-spacing:3px;color:#444;margin-bottom:8px;">SESSION NOTES</div>
      <textarea style="width:100%;padding:9px 11px;background:#181818;border:1px solid ${dc}33;border-radius:9px;color:#bbb;font-size:12px;outline:none;resize:none;line-height:1.6;" rows="3"
        placeholder="Overall notes for this session..." oninput="setSN('${S.day}',this.value);">${getSN(S.day)}</textarea>
    </div></div>`;

    // Save button
    html+=`<div class="section"><button class="save-btn" style="background:${dc};" onclick="saveSession();">${S.saveMsg||"💾 Save Session"}</button></div>`;

    // Reminders
    html+=`<div class="section"><div class="card">
      <div style="font-size:10px;letter-spacing:3px;color:#444;margin-bottom:8px;">REMINDERS</div>
      ${["Always pyramid up in weight","Rest 60-90 sec between sets","Last 2 reps should feel hard","Stop if wrist gives sharp pain","Warm up 5 min before every session"].map((r,i,a)=>`
        <div style="font-size:12px;color:#777;padding:6px 0;border-bottom:${i<a.length-1?"1px solid #181818":"none"};display:flex;gap:7px;">
          <span style="color:${dc};">→</span>${r}</div>`).join("")}
    </div></div>`;
  }

  // HISTORY TAB
  if(S.tab==="history"){
    html+=`<div style="padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:16px;font-weight:bold;color:#eee;">Session History</div>
        <button style="padding:8px 14px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#aaa;font-size:12px;cursor:pointer;" onclick="exportCSV();">⬇ Export CSV</button>
      </div>
      <div style="display:flex;overflow-x:auto;gap:6px;margin-bottom:14px;">
        ${["All",...DAYS].map(d=>{
          const a=S.histFilter===d;
          const c=d==="All"?"#888":PLAN[d].color;
          return`<button class="filter-btn" style="${a?`border-color:${c};color:${c};background:#1e1e1e;`:""}" onclick="S.histFilter='${d}';render();">${d==="All"?"All":d.slice(0,3)}</button>`;
        }).join("")}
      </div>`;

    if(filtHist.length===0){
      html+=`<div style="text-align:center;color:#444;padding:60px 20px;font-size:14px;line-height:2;">No sessions saved yet.<br><span style="font-size:12px;color:#333;">Complete a workout and tap Save Session.</span></div>`;
    } else {
      filtHist.forEach(h=>{
        const hc=PLAN[h.day]?.color||"#888";
        const compEx=h.exercises.filter(e=>e.setsCompleted>0).length;
        html+=`<div style="background:#111;border-radius:14px;border:1px solid ${hc}22;margin-bottom:10px;overflow:hidden;">
          <div style="padding:12px 14px 8px;background:${hc}0d;border-bottom:1px solid ${hc}22;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div><span style="font-size:14px;font-weight:bold;color:${hc};">${h.day}</span><span style="font-size:12px;color:#555;margin-left:8px;">${h.dayName}</span></div>
              <div style="font-size:11px;color:#555;">📅 ${fmtDate(h.date)}</div>
            </div>
            <div style="font-size:11px;color:#555;margin-top:3px;">${compEx}/${h.exercises.length} exercises</div>
          </div>
          <div style="padding:8px 14px;">`;
        h.exercises.forEach((ex,i)=>{
          html+=`<div style="padding:6px 0;border-bottom:${i<h.exercises.length-1?"1px solid #181818":"none"};">
            <div style="display:flex;justify-content:space-between;">
              <div style="font-size:12px;font-weight:bold;color:${ex.setsCompleted>0?"#ddd":"#444"};">${ex.name}</div>
              <div style="font-size:10px;color:#444;">${ex.setsCompleted}/${ex.totalSets} sets</div>
            </div>`;
          if(ex.sets){
            ex.sets.filter(s=>s.done||s.weight!=="-").forEach((s,si)=>{
              html+=`<div style="display:flex;gap:8px;font-size:11px;color:#666;margin-top:3px;align-items:center;">
                <span style="color:#555;width:20px;">S${si+1}</span>
                <span style="color:${hc};">${s.weight!=="-"?s.weight+"kg":""}</span>
                <span>${s.reps!=="-"?s.reps+" reps":""}</span>
                <span>${renderStarsStatic(s.rating)}</span>
              </div>`;
            });
          }
          if(ex.note) html+=`<div style="font-size:10px;color:#555;font-style:italic;margin-top:3px;">📝 ${ex.note}</div>`;
          html+=`</div>`;
        });
        html+=`</div>`;
        if(h.sessionNote) html+=`<div style="padding:8px 14px 12px;border-top:1px solid #181818;"><div style="font-size:10px;color:#444;margin-bottom:3px;">SESSION NOTE</div><div style="font-size:12px;color:#777;font-style:italic;">${h.sessionNote}</div></div>`;
        html+=`</div>`;
      });
    }
    html+=`</div>`;
  }

  document.getElementById("app").innerHTML=html;
}

render();
</script>
</body>
</html>
